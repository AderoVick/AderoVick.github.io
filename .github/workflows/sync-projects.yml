name: Sync project catalogue

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: [main]
    paths:
      - "data/project-overrides.json"
      - "scripts/sync_projects.py"

permissions:
  contents: write

concurrency:
  group: project-catalogue-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build catalogue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: AderoVick
        run: python scripts/sync_projects.py
      - name: Commit catalogue changes
        run: |
          if git diff --quiet -- data/projects.json; then
            echo "No catalogue changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git commit -m "chore: refresh project catalogue"
          git push
